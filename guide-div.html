      :root {

      .guide-wrapper {

      }

      .lang-btn:focus-visible,
      .card-btn:focus-visible,
      .close-modal:focus-visible {
        outline: 3px solid rgba(203, 57, 117, 0.35);
        outline-offset: 2px;
      }

      .lang-btn[aria-pressed="true"] {
        background: linear-gradient(145deg, var(--color-accent-1), var(--color-accent-2));
        transform: translateY(-1px);
      }

      .lang-btn:hover,
      .lang-btn:active {
        transform: translateY(-1px);
      }

      h1 {

        color: var(--color-accent-2);
      }

      .guide-grid {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 12px;
      }

      .card-btn {
        border: 0;
        border-radius: var(--radius-lg);

        align-items: center;
        justify-content: center;
        text-align: center;
        color: var(--color-text);
      }

      .card-btn:hover,

        transform: translateY(-1px);
      }

      .emoji {
        font-size: clamp(1.6rem, 4.8vw, 2.3rem);

      }

      .label {
        font-size: 0.95rem;
        font-weight: 700;
        line-height: 1.3;
      }
      .modal {

        inset: 0;

        z-index: 2147483647;
        justify-content: center;
        align-items: flex-start;
        padding: 16px;
      }

      .modal.open {
        display: flex;
      }

        border-radius: 999px;

      .map-link {

      }


      /* Strong embed isolation against theme CSS conflicts */
      #gvd-root .guide-grid,
      #gvd-root .grid {

        gap: 12px !important;

      }

      #gvd-root .guide-wrapper {
        width: 100% !important;
      }

      @media (max-width: 850px) {

        }
      }

      @media (max-width: 680px) {
        .guide-wrapper {
          padding: 20px 12px 24px;
        }

        #gvd-root .guide-grid,
        .guide-grid,
        #gvd-root .grid {
          grid-template-columns: repeat(2, minmax(0, 1fr)) !important;
        }

        .card-btn {
          min-height: 120px;
        }

        .modal {
          padding: env(safe-area-inset-top, 8px) 0 env(safe-area-inset-bottom, 8px);

        }

        .modal-content {
          width: 100vw;

        #gvd-root .guide-grid,

        #gvd-root .grid {
          grid-template-columns: 1fr !important;
        }

        .lang-btn {
          font-size: 1.1rem;
        }
      }
    
</style>

              body: `<p><strong>Informazioni Utili:</strong><br />Nella tua camera troverai tutto il necessario per la colazione del giorno successivo. Se hai una prenotazione di più notti, noi torneremo ogni mattina alle 10:00 AM per fare una pulizia giornaliera della stanza e rifare le colazioni.</p><p>Nel periodo invernale il riscaldamento si accende in automatico. Per personalizzare la temperatura della stanza potete usare il climatizzatore con il telecomando bianco.</p><p>A questo link troverai un breve video con le istruzioni su come usare la nostra macchina del caffè:<br /><a href="https://www.bbvaticanstories.it/bb-roma-vaticano/how-to-use-our-coffee-machine/" target="_blank" rel="noopener noreferrer">Come usare la nostra macchina del caffè</a></p><p>Per i soggiorni più lunghi: il cambio asciugamani e lenzuola viene effettuato ogni 3 giorni.</p><p><strong>Regole della casa:</strong></p><ul><li>Nelle stanze è severamente vietato fumare.</li><li>Si prega di rispettare l'orario di silenzio e non fare rumore dalle 22:00 alle 08:00.</li></ul>`,

            restaurants: {
              title: "Ristoranti",
              body: `<p>Ecco i nostri ristoranti consigliati:</p><div class="restaurant-list"><div class="restaurant-card"><h3>Ristorante Dai Miei</h3><p>Il migliore per i piatti di pasta tipici della cucina Romana. Consigliamo di prenotare.</p><p><strong>Via delle Fornaci, 75</strong></p><p><a class="map-link" href="https://maps.app.goo.gl/Tw7zjydJza7RVtAH9" target="_blank" rel="noopener noreferrer">Link Google Maps</a></p></div><div class="restaurant-card"><h3>Il Piccolo Pub</h3><p>Ottima Pinsa Romana (variante della Pizza), ottime birre alla spina, vicinissimo al nostro B&amp;B.</p><p><strong>Via delle Fornaci, 22</strong></p><p><a class="map-link" href="https://maps.app.goo.gl/WM1tmL39637HUFnE7" target="_blank" rel="noopener noreferrer">Link Google Maps</a></p></div><div class="restaurant-card"><h3>Osteria Sant'Uffizio Vaticano</h3><p>Gestione Italiana, ottima cucina e orari di apertura estesi.</p><p><strong>Via delle Fornaci, 5</strong></p><p><a class="map-link" href="https://maps.app.goo.gl/1pcsPJNQiFeyzowF7" target="_blank" rel="noopener noreferrer">Link Google Maps</a></p></div></div>`,

              body: `<p>Ecco i negozi e servizi utili consigliati:</p><div class="restaurant-list"><div class="restaurant-card"><h3>Carrefour Market</h3><p>Supermercato con ottimi prodotti, aperto fino alle 22:00.</p><p><strong>Via delle Fornaci, 136</strong></p><p><a class="map-link" href="https://maps.app.goo.gl/VUoQnUHaRb2dEw1L6" target="_blank" rel="noopener noreferrer">Link Google Maps</a></p></div><div class="restaurant-card"><h3>Farmacia Leone</h3><p>Farmacia molto vicina al nostro B&amp;B, aperta fino alle 19:30.</p><p><strong>Via di Porta Cavalleggeri, 3</strong></p><p><a class="map-link" href="https://maps.app.goo.gl/SsGCmLL1Poap1mm86" target="_blank" rel="noopener noreferrer">Link Google Maps</a></p></div><div class="restaurant-card"><h3>Gelotti</h3><p>Ottima gelateria a due passi dal nostro B&amp;B.</p><p><strong>Via delle Fornaci, 16</strong></p><p><a class="map-link" href="https://maps.app.goo.gl/fcVKUbQCRdSU4Ncw9" target="_blank" rel="noopener noreferrer">Link Google Maps</a></p></div><div class="restaurant-card"><h3>Pasticceria Rispo Franca</h3><p>Pasticceria artigianale di qualità eccellente e con prezzi onesti.</p><p><strong>Via della Stazione di S.Pietro, 24</strong></p><p><a class="map-link" href="https://maps.app.goo.gl/AaxfMUTyf4jxKinX9" target="_blank" rel="noopener noreferrer">Link Google Maps</a></p></div><div class="restaurant-card"><h3>Tabaccheria Iqos Partner</h3><p>Negozio dove si possono acquistare i biglietti dell'autobus.</p><p><strong>Via della Stazione di S.Pietro, 19</strong></p><p><a class="map-link" href="https://maps.app.goo.gl/zUkcQ2uan8wb27zr8" target="_blank" rel="noopener noreferrer">Link Google Maps</a></p></div><div class="restaurant-card"><h3>BICIEVENTO</h3><p>Noleggio biciclette professionale, interessanti tour in bicicletta.</p><p><strong>Via di Santa Maria alle Fornaci, 6</strong></p><p><a class="map-link" href="https://maps.app.goo.gl/uKPNHWNAfnUZcBtN8" target="_blank" rel="noopener noreferrer">Link Google Maps</a></p></div></div>`,

            places: {
              title: "Luoghi di interesse",
              body: `<p>Ecco i nostri luoghi di interesse consigliati:</p><div class="restaurant-list"><div class="restaurant-card"><h3>Piazza San Pietro (Vaticano)</h3><p>Il grande abbraccio del colonnato del Bernini: perfetta per foto, atmosfera e prospettive sulla Basilica.</p><p><a class="map-link" href="https://maps.app.goo.gl/PnwugsYVf5xraM2G8" target="_blank" rel="noopener noreferrer">Link Google Maps</a></p></div><div class="restaurant-card"><h3>Basilica di San Pietro</h3><p>Capolavoro assoluto dell’arte sacra: cupola, marmi, altari e (se sali) una vista spettacolare su Roma.</p><p><a class="map-link" href="https://maps.app.goo.gl/AvAXwvAWh8XaS6vH8" target="_blank" rel="noopener noreferrer">Link Google Maps</a></p></div><div class="restaurant-card"><h3>Musei Vaticani e Cappella Sistina</h3><p>Una delle collezioni più importanti al mondo; la Sistina vale da sola la visita (Michelangelo).</p><p><a class="map-link" href="https://maps.app.goo.gl/m1TBpPwapjMR7wCx8" target="_blank" rel="noopener noreferrer">Link Google Maps</a></p></div><div class="restaurant-card"><h3>Castel Sant’Angelo (Museo Nazionale)</h3><p>Da mausoleo imperiale a fortezza papale: stanze storiche e terrazza panoramica sul Tevere.</p><p><a class="map-link" href="https://maps.app.goo.gl/6Y41RnuZ9oGJ8xKTA" target="_blank" rel="noopener noreferrer">Link Google Maps</a></p></div><div class="restaurant-card"><h3>Ponte Sant’Angelo</h3><p>Passeggiata scenografica tra statue di angeli e uno dei migliori scorci su Castel Sant’Angelo.</p><p><a class="map-link" href="https://maps.app.goo.gl/pu5GGFPGStDbKRYd9" target="_blank" rel="noopener noreferrer">Link Google Maps</a></p></div><div class="restaurant-card"><h3>Piazza Navona</h3><p>Piazza barocca “da cartolina”, con fontane celebri e tanta vita di strada.</p><p><a class="map-link" href="https://maps.app.goo.gl/52xaVpepdygxBpHo6" target="_blank" rel="noopener noreferrer">Link Google Maps</a></p></div><div class="restaurant-card"><h3>Chiesa di Sant’Agnese in Agone</h3><p>Gioiello barocco affacciato su Piazza Navona: interni eleganti e storia affascinante.</p><p><a class="map-link" href="https://maps.app.goo.gl/6GC4TUyzrwqjZCoeA" target="_blank" rel="noopener noreferrer">Link Google Maps</a></p></div><div class="restaurant-card"><h3>Chiesa di San Luigi dei Francesi</h3><p>Da non perdere per Caravaggio: nella Cappella Contarelli ci sono capolavori dedicati a San Matteo.</p><p><a class="map-link" href="https://maps.app.goo.gl/WBR9BP5wMq4E6qHB8" target="_blank" rel="noopener noreferrer">Link Google Maps</a></p></div><div class="restaurant-card"><h3>Pantheon (Santa Maria ad Martyres)</h3><p>Meraviglia dell’antica Roma: la cupola e l’oculo lasciano sempre a bocca aperta.</p><p><a class="map-link" href="https://maps.app.goo.gl/pNZD4Wf81Xjv3Cdr8" target="_blank" rel="noopener noreferrer">Link Google Maps</a></p></div><div class="restaurant-card"><h3>Largo di Torre Argentina</h3><p>Area archeologica con templi antichi in pieno centro: un tuffo nella Roma repubblicana.</p><p><a class="map-link" href="https://maps.app.goo.gl/XUSGks9iwRumusZJ8" target="_blank" rel="noopener noreferrer">Link Google Maps</a></p></div><div class="restaurant-card"><h3>Piazza Venezia e Vittoriano (Altare della Patria)</h3><p>Punto “snodo” della città: monumentale, scenografico e pieno di viste interessanti.</p><p><a class="map-link" href="https://maps.app.goo.gl/67RH7rQsEd4q2EeF6" target="_blank" rel="noopener noreferrer">Link Google Maps</a></p></div><div class="restaurant-card"><h3>Basilica di Santa Maria in Ara Coeli e Scalinata</h3><p>Chiesa sul Campidoglio raggiunta da una famosa scalinata (i “124 gradini” sono un classico).</p><p><a class="map-link" href="https://maps.app.goo.gl/2y1qFaMpmgbHuUT16" target="_blank" rel="noopener noreferrer">Link Google Maps</a></p></div><div class="restaurant-card"><h3>Musei Capitolini (Campidoglio)</h3><p>Il museo civico simbolo di Roma: tra i pezzi iconici ci sono la Lupa Capitolina e grandi sculture antiche.</p><p><a class="map-link" href="https://maps.app.goo.gl/EBQXgfKYVLXXNG2cA" target="_blank" rel="noopener noreferrer">Link Google Maps</a></p></div><div class="restaurant-card"><h3>Foro Romano e Via dei Fori Imperiali</h3><p>Il cuore dell’antica Roma: rovine, colonne e prospettive incredibili camminando verso il Colosseo.</p><p><a class="map-link" href="https://maps.app.goo.gl/7VwqPrgxt1TmKiEY9" target="_blank" rel="noopener noreferrer">Link Google Maps</a></p></div><div class="restaurant-card"><h3>Colosseo</h3><p>L’anfiteatro più famoso del mondo: impressionante dal vivo, soprattutto al tramonto o in serata.</p><p><a class="map-link" href="https://maps.app.goo.gl/xbSWmQJRBcQE5tcc6" target="_blank" rel="noopener noreferrer">Link Google Maps</a></p></div></div>`,

            checkin: {

              body: `<p><strong>Check-In Instructions:</strong><br />Please contact us on WhatsApp at <strong>+393479282875</strong> to let us know your arrival time and send photos of the identity documents for all guests.</p><p>Rooms will be ready and accessible from 2:00 PM on the day of arrival.</p><p>If you arrive earlier, we can arrange free luggage storage, but only starting from 10:30 AM. In this case, it is even more important that you contact us to organize the luggage drop-off.</p><p>From 2:00 PM on the day of arrival, we will send you the access codes and Self Check-In instructions.</p><p>When you arrive at the main entrance, please keep in mind that the intercom is disabled so as not to disturb guests inside, so you must always call us or message us on WhatsApp.</p><p><strong>Check out:</strong><br />Check-out time is no later than 10:00 AM. You can leave the keys inside the room and simply close the door.</p><p>Before check-out, please make sure you have completed payment for the room or the city tax.</p><p>We also ask you to switch off all lights and the air conditioning before leaving the B&amp;B.</p>`,

            shops: {
              title: "Shops",
              body: `<p>Here are our recommended nearby shops and services:</p><div class="restaurant-list"><div class="restaurant-card"><h3>Carrefour Market</h3><p>Supermarket with excellent products, open until 10:00 PM.</p><p><strong>Via delle Fornaci, 136</strong></p><p><a class="map-link" href="https://maps.app.goo.gl/VUoQnUHaRb2dEw1L6" target="_blank" rel="noopener noreferrer">Google Maps Link</a></p></div><div class="restaurant-card"><h3>Farmacia Leone</h3><p>Pharmacy very close to our B&amp;B, open until 7:30 PM.</p><p><strong>Via di Porta Cavalleggeri, 3</strong></p><p><a class="map-link" href="https://maps.app.goo.gl/SsGCmLL1Poap1mm86" target="_blank" rel="noopener noreferrer">Google Maps Link</a></p></div><div class="restaurant-card"><h3>Gelotti</h3><p>Excellent gelateria just a short walk from our B&amp;B.</p><p><strong>Via delle Fornaci, 16</strong></p><p><a class="map-link" href="https://maps.app.goo.gl/fcVKUbQCRdSU4Ncw9" target="_blank" rel="noopener noreferrer">Google Maps Link</a></p></div><div class="restaurant-card"><h3>Pasticceria Rispo Franca</h3><p>Artisanal pastry shop with excellent quality and fair prices.</p><p><strong>Via della Stazione di S.Pietro, 24</strong></p><p><a class="map-link" href="https://maps.app.goo.gl/AaxfMUTyf4jxKinX9" target="_blank" rel="noopener noreferrer">Google Maps Link</a></p></div><div class="restaurant-card"><h3>Tabaccheria Iqos Partner</h3><p>Shop where you can buy bus tickets.</p><p><strong>Via della Stazione di S.Pietro, 19</strong></p><p><a class="map-link" href="https://maps.app.goo.gl/zUkcQ2uan8wb27zr8" target="_blank" rel="noopener noreferrer">Google Maps Link</a></p></div><div class="restaurant-card"><h3>BICIEVENTO</h3><p>Professional bike rental with interesting bike tours.</p><p><strong>Via di Santa Maria alle Fornaci, 6</strong></p><p><a class="map-link" href="https://maps.app.goo.gl/uKPNHWNAfnUZcBtN8" target="_blank" rel="noopener noreferrer">Google Maps Link</a></p></div></div>`,

            places: {
              title: "Places of Interest",
              body: `<p>Here are our recommended places of interest:</p><div class="restaurant-list"><div class="restaurant-card"><h3>St. Peter's Square (Vatican)</h3><p>The grand embrace of Bernini’s colonnade: perfect for photos, atmosphere, and views of the Basilica.</p><p><a class="map-link" href="https://maps.app.goo.gl/PnwugsYVf5xraM2G8" target="_blank" rel="noopener noreferrer">Google Maps Link</a></p></div><div class="restaurant-card"><h3>St. Peter's Basilica</h3><p>An absolute masterpiece of sacred art: dome, marble, altars, and (if you climb) a spectacular view over Rome.</p><p><a class="map-link" href="https://maps.app.goo.gl/AvAXwvAWh8XaS6vH8" target="_blank" rel="noopener noreferrer">Google Maps Link</a></p></div><div class="restaurant-card"><h3>Vatican Museums & Sistine Chapel</h3><p>One of the most important collections in the world; the Sistine Chapel alone is worth the visit (Michelangelo).</p><p><a class="map-link" href="https://maps.app.goo.gl/m1TBpPwapjMR7wCx8" target="_blank" rel="noopener noreferrer">Google Maps Link</a></p></div><div class="restaurant-card"><h3>Castel Sant’Angelo (National Museum)</h3><p>From imperial mausoleum to papal fortress: historic rooms and a panoramic terrace over the Tiber.</p><p><a class="map-link" href="https://maps.app.goo.gl/6Y41RnuZ9oGJ8xKTA" target="_blank" rel="noopener noreferrer">Google Maps Link</a></p></div><div class="restaurant-card"><h3>Ponte Sant’Angelo</h3><p>Scenic walk among angel statues with one of the best views of Castel Sant’Angelo.</p><p><a class="map-link" href="https://maps.app.goo.gl/pu5GGFPGStDbKRYd9" target="_blank" rel="noopener noreferrer">Google Maps Link</a></p></div><div class="restaurant-card"><h3>Piazza Navona</h3><p>A postcard-perfect Baroque square with famous fountains and lively street life.</p><p><a class="map-link" href="https://maps.app.goo.gl/52xaVpepdygxBpHo6" target="_blank" rel="noopener noreferrer">Google Maps Link</a></p></div><div class="restaurant-card"><h3>Church of Sant’Agnese in Agone</h3><p>A Baroque jewel overlooking Piazza Navona: elegant interiors and fascinating history.</p><p><a class="map-link" href="https://maps.app.goo.gl/6GC4TUyzrwqjZCoeA" target="_blank" rel="noopener noreferrer">Google Maps Link</a></p></div><div class="restaurant-card"><h3>Church of San Luigi dei Francesi</h3><p>Unmissable for Caravaggio: the Contarelli Chapel holds masterpieces dedicated to Saint Matthew.</p><p><a class="map-link" href="https://maps.app.goo.gl/WBR9BP5wMq4E6qHB8" target="_blank" rel="noopener noreferrer">Google Maps Link</a></p></div><div class="restaurant-card"><h3>Pantheon (Santa Maria ad Martyres)</h3><p>A wonder of ancient Rome: the dome and oculus always leave visitors speechless.</p><p><a class="map-link" href="https://maps.app.goo.gl/pNZD4Wf81Xjv3Cdr8" target="_blank" rel="noopener noreferrer">Google Maps Link</a></p></div><div class="restaurant-card"><h3>Largo di Torre Argentina</h3><p>An archaeological area with ancient temples in the city center: a dive into Republican Rome.</p><p><a class="map-link" href="https://maps.app.goo.gl/XUSGks9iwRumusZJ8" target="_blank" rel="noopener noreferrer">Google Maps Link</a></p></div><div class="restaurant-card"><h3>Piazza Venezia & Vittoriano (Altar of the Fatherland)</h3><p>A major city hub: monumental, scenic, and full of interesting viewpoints.</p><p><a class="map-link" href="https://maps.app.goo.gl/67RH7rQsEd4q2EeF6" target="_blank" rel="noopener noreferrer">Google Maps Link</a></p></div><div class="restaurant-card"><h3>Basilica of Santa Maria in Ara Coeli & Stairway</h3><p>Church on the Capitoline Hill reached by a famous staircase (“124 steps” are a classic).</p><p><a class="map-link" href="https://maps.app.goo.gl/2y1qFaMpmgbHuUT16" target="_blank" rel="noopener noreferrer">Google Maps Link</a></p></div><div class="restaurant-card"><h3>Capitoline Museums (Campidoglio)</h3><p>Rome’s symbolic civic museum: iconic pieces include the Capitoline Wolf and major ancient sculptures.</p><p><a class="map-link" href="https://maps.app.goo.gl/EBQXgfKYVLXXNG2cA" target="_blank" rel="noopener noreferrer">Google Maps Link</a></p></div><div class="restaurant-card"><h3>Roman Forum & Via dei Fori Imperiali</h3><p>The heart of ancient Rome: ruins, columns, and incredible views walking toward the Colosseum.</p><p><a class="map-link" href="https://maps.app.goo.gl/7VwqPrgxt1TmKiEY9" target="_blank" rel="noopener noreferrer">Google Maps Link</a></p></div><div class="restaurant-card"><h3>Colosseum</h3><p>The world’s most famous amphitheater: stunning in person, especially at sunset or in the evening.</p><p><a class="map-link" href="https://maps.app.goo.gl/xbSWmQJRBcQE5tcc6" target="_blank" rel="noopener noreferrer">Google Maps Link</a></p></div></div>`,

p><p><a class="map-link" href="https://maps.app.goo.gl/EBQXgfKYVLXXNG2cA" target="_blank" rel="noopener noreferrer">Google Maps Link</a></p></div><div class="restaurant-card"><h3>Roman Forum & Via dei Fori Imperiali</h3><p>The heart of ancient Rome: ruins, columns, and incredible views walking toward the Colosseum.</p><p><a class="map-link" href="https://maps.app.goo.gl/7VwqPrgxt1TmKiEY9" target="_blank" rel="noopener noreferrer">Google Maps Link</a></p></div><div class="restaurant-card"><h3>Colosseum</h3><p>The world’s most famous amphitheater: stunning in person, especially at sunset or in the evening.</p><p><a class="map-link" href="https://maps.app.goo.gl/xbSWmQJRBcQE5tcc6" target="_blank" rel="noopener noreferrer">Google Maps Link</a></p></div></div>`,

      function initGuideDiv() {
        const root = document.getElementById("gvd-root");
        if (!root || root.__gvdInitialized === true) return false;

        const langButtons = root.querySelectorAll(".lang-btn");
        const i18nNodes = root.querySelectorAll("[data-i18n]");
        const modal = root.querySelector("#guideModal");
        const modalTitle = root.querySelector("#modalTitle");
        const modalBody = root.querySelector("#modalBody");
        const closeModalBtn = root.querySelector("#closeModal");
        const cards = root.querySelectorAll(".card-btn");

        if (!modal || !modalTitle || !modalBody || !closeModalBtn || !langButtons.length || !cards.length) {
          return false;
        }

        let currentLang = "it";

        function getOverlayHeaderOffset() {
          const headerIds = ["top-header", "main-header"];
          return headerIds.reduce((total, id) => {
            const el = document.getElementById(id);
            if (!el) return total;
            const style = window.getComputedStyle(el);
            if (style.display === "none" || style.visibility === "hidden") return total;
            const isOverlayHeader = style.position === "fixed" || style.position === "sticky";
            if (!isOverlayHeader) return total;
            const rect = el.getBoundingClientRect();
            if (rect.height <= 0) return total;
            return total + rect.height;
          }, 0);
        }

        function updateModalOffset() {
          root.style.setProperty("--gvd-header-offset", `${Math.ceil(getOverlayHeaderOffset())}px`);
        }

        function applyLanguage(lang) {
          currentLang = translations[lang] ? lang : "it";
          i18nNodes.forEach((node) => {
            const key = node.dataset.i18n;
            if (translations[currentLang][key]) {
              node.textContent = translations[currentLang][key];
            }
          });

          closeModalBtn.setAttribute("aria-label", translations[currentLang].closeLabel);

          langButtons.forEach((btn) => {
            btn.setAttribute("aria-pressed", String(btn.dataset.lang === currentLang));
          });
        }

        function openModal(itemKey) {
          const section = translations[currentLang].content[itemKey];
          if (!section) return;

          modalTitle.textContent = section.title;
          modalBody.innerHTML = section.body;
          modal.classList.add("open");
          modal.setAttribute("aria-hidden", "false");
          document.body.style.overflow = "hidden";
          document.body.classList.add("gvd-modal-open");
        }

        function closeModal() {
          modal.classList.remove("open");
          modal.setAttribute("aria-hidden", "true");
          document.body.style.overflow = "";
          document.body.classList.remove("gvd-modal-open");
        }

        langButtons.forEach((button) => {
          button.addEventListener("click", () => {
            applyLanguage(button.dataset.lang);
          });
        });

        cards.forEach((card) => {
          card.addEventListener("click", () => openModal(card.dataset.item));
        });

        closeModalBtn.addEventListener("click", closeModal);
        modal.addEventListener("click", (event) => {
          if (event.target === modal) closeModal();
        });

        document.addEventListener("keydown", (event) => {
          if (event.key === "Escape" && modal.classList.contains("open")) {
            closeModal();
          }
        });

        updateModalOffset();
        if (!window.__gvdOffsetListenersBound) {
          window.addEventListener("resize", updateModalOffset, { passive: true });
          window.addEventListener("scroll", updateModalOffset, { passive: true });
          window.__gvdOffsetListenersBound = true;
        }
        applyLanguage("it");
        root.__gvdInitialized = true;
        return true;
      }

      initGuideDiv();
      document.addEventListener("DOMContentLoaded", initGuideDiv);
      const observer = new MutationObserver(() => {
        initGuideDiv();
      });
      observer.observe(document.documentElement, { childList: true, subtree: true });
    
</script>
