<!DOCTYPE html>
<html lang="it">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>La nostra Guida</title>
    <style>
      :root {
        --color-accent-1: #cb3975;
        --color-accent-2: #eb5e3e;
        --color-text: #486066;
        --color-white: #ffffff;
        --card-shadow: 0 8px 22px rgba(72, 96, 102, 0.16);
        --radius-lg: 18px;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial,
          sans-serif;
        color: var(--color-text);
        background: linear-gradient(180deg, rgba(203, 57, 117, 0.06) 0%, rgba(235, 94, 62, 0.08) 100%);
        min-height: 100vh;
      }

      .guide-wrapper {
        max-width: 980px;
        margin: 0 auto;
        padding: 24px 16px 38px;
      }

      .lang-switcher {
        display: flex;
        gap: 10px;
        justify-content: center;
        margin-bottom: 14px;
      }

      .lang-btn {
        border: 0;
        cursor: pointer;
        border-radius: 999px;
        padding: 8px 14px;
        font-size: 1.2rem;
        line-height: 1;
        background: var(--color-white);
        box-shadow: 0 4px 14px rgba(72, 96, 102, 0.18);
        transition: transform 0.2s ease, box-shadow 0.2s ease;
      }

      .lang-btn:focus-visible,
      .card-btn:focus-visible,
      .close-modal:focus-visible {
        outline: 3px solid rgba(203, 57, 117, 0.35);
        outline-offset: 2px;
      }

      .lang-btn[aria-pressed="true"] {
        background: linear-gradient(145deg, var(--color-accent-1), var(--color-accent-2));
        transform: translateY(-1px);
      }

      .lang-btn:hover,
      .lang-btn:active {
        transform: translateY(-1px);
      }

      h1 {
        margin: 0 0 20px;
        font-size: clamp(1.7rem, 4vw, 2.4rem);
        text-align: center;
        color: var(--color-accent-2);
      }

      .grid {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 12px;
      }

      .card-btn {
        border: 0;
        border-radius: var(--radius-lg);
        min-height: 132px;
        background: var(--color-white);
        box-shadow: var(--card-shadow);
        cursor: pointer;
        padding: 14px 10px;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
        color: var(--color-text);
      }

      .card-btn:hover,
      .card-btn:active {
        transform: translateY(-1px);
      }

      .emoji {
        font-size: clamp(1.6rem, 4.8vw, 2.3rem);
        margin-bottom: 8px;
      }

      .label {
        font-size: 0.95rem;
        font-weight: 700;
        line-height: 1.3;
      }

      .modal {
        position: fixed;
        inset: 0;
        background: rgba(30, 38, 41, 0.88);
        display: none;
        z-index: 9999;
        padding: env(safe-area-inset-top, 16px) 16px env(safe-area-inset-bottom, 16px);
      }

      .modal.open {
        display: block;
      }

      .modal-content {
        background: var(--color-white);
        max-width: 860px;
        margin: 0 auto;
        height: min(100%, 920px);
        border-radius: 16px;
        padding: 18px;
        overflow-y: auto;
        -webkit-overflow-scrolling: touch;
      }

      .modal-header {
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        gap: 8px;
      }

      .modal h2 {
        margin: 0;
        color: var(--color-accent-2);
        font-size: clamp(1.25rem, 3vw, 1.7rem);
      }

      .close-modal {
        border: 0;
        width: 40px;
        height: 40px;
        border-radius: 999px;
        background: linear-gradient(145deg, var(--color-accent-1), var(--color-accent-2));
        color: var(--color-white);
        font-size: 1.4rem;
        cursor: pointer;
        flex: 0 0 auto;
      }

      .modal p,
      .modal li {
        line-height: 1.6;
        font-size: 1rem;
      }

      .restaurant-list {
        display: grid;
        gap: 12px;
      }

      .restaurant-card {
        border: 1px solid rgba(203, 57, 117, 0.22);
        border-radius: 14px;
        padding: 14px;
        background: linear-gradient(180deg, rgba(203, 57, 117, 0.05), rgba(235, 94, 62, 0.08));
        box-shadow: 0 6px 14px rgba(72, 96, 102, 0.12);
      }

      .restaurant-card h3 {
        margin: 0 0 8px;
        color: var(--color-accent-2);
        font-size: 1.05rem;
      }

      .restaurant-card p {
        margin: 0 0 8px;
      }

      .map-link {
        color: var(--color-accent-2);
        font-weight: 700;
        text-decoration: underline;
        word-break: break-word;
      }

      @media (max-width: 850px) {
        .grid {
          grid-template-columns: repeat(3, minmax(0, 1fr));
        }
      }

      @media (max-width: 680px) {
        .guide-wrapper {
          padding: 20px 12px 24px;
        }

        .grid {
          grid-template-columns: repeat(2, minmax(0, 1fr));
        }

        .card-btn {
          min-height: 120px;
        }
      }

      @media (max-width: 380px) {
        .grid {
          grid-template-columns: 1fr;
        }

        .lang-btn {
          font-size: 1.1rem;
        }
      }
    </style>
  </head>
  <body>
    <div class="guide-wrapper">

      </div>
    </div>

            room: {
              title: "La tua Camera",
              body: `<p><strong>Informazioni Utili:</strong><br />Nella tua camera troverai tutto il necessario per la colazione del giorno successivo. Se hai una prenotazione di più notti, noi torneremo ogni mattina alle 10:00 AM per fare una pulizia giornaliera della stanza e rifare le colazioni.</p><p>Nel periodo invernale il riscaldamento si accende in automatico. Per personalizzare la temperatura della stanza potete usare il climatizzatore con il telecomando bianco.</p><p>A questo link troverai un breve video con le istruzioni su come usare la nostra macchina del caffè:<br /><a href="https://www.bbvaticanstories.it/bb-roma-vaticano/how-to-use-our-coffee-machine/" target="_blank" rel="noopener noreferrer">Come usare la nostra macchina del caffè</a></p><p>Per i soggiorni più lunghi: il cambio asciugamani e lenzuola viene effettuato ogni 3 giorni.</p><p><strong>Regole della casa:</strong></p><ul><li>Nelle stanze è severamente vietato fumare.</li><li>Si prega di rispettare l'orario di silenzio e non fare rumore dalle 22:00 alle 08:00.</li></ul>`,

            checkin: {
              title: "Check-In / Check out",
              body: `<p><strong>Istruzioni per il Check-In:</strong><br />Vi chiediamo di contattarci tramite WhatsApp al numero <strong>+393479282875</strong> per comunicarci il vostro orario di arrivo e inviarci le foto dei documenti di identità di tutti gli ospiti.</p><p>Le camere saranno pronte e accessibili dalle ore 14:00 del giorno di arrivo.</p><p>Se arrivate prima di questo orario possiamo organizzare il deposito bagagli gratuito, ma solamente a partire dalle ore 10:30 AM. In questo caso è ancora più importante che ci contattate per organizzare il deposito.</p><p>A partire dalle ore 14:00 del giorno di arrivo vi invieremo i codici di accesso e le istruzioni per il Self-Check-In.</p><p>Quando arrivate davanti all'ingresso principale, tenete a mente che il citofono è disattivato per non disturbare gli ospiti che sono all'interno, quindi dovete sempre chiamarci o scriverci su WhatsApp.</p><p><strong>Check out:</strong><br />L'orario di Check out è non più tardi delle 10:00 AM. Potete lasciare le chiavi all'interno della stanza e semplicemente chiudere la porta.</p><p>Prima del Check out verificate di aver completato il pagamento della stanza o della tassa di soggiorno.</p><p>Chiediamo inoltre di spegnere tutte le luci e l'aria condizionata prima di lasciare il B&amp;B.</p>`,

            restaurants: {

              body: `<p>Ecco i nostri ristoranti consigliati:</p><div class="restaurant-list"><div class="restaurant-card"><h3>Ristorante Dai Miei</h3><p>Il migliore per i piatti di pasta tipici della cucina Romana. Consigliamo di prenotare.</p><p><strong>Via delle Fornaci, 75</strong></p><p><a class="map-link" href="https://maps.app.goo.gl/Tw7zjydJza7RVtAH9" target="_blank" rel="noopener noreferrer">Link Google Maps</a></p></div><div class="restaurant-card"><h3>Il Piccolo Pub</h3><p>Ottima Pinsa Romana (variante della Pizza), ottime birre alla spina, vicinissimo al nostro B&amp;B.</p><p><strong>Via delle Fornaci, 22</strong></p><p><a class="map-link" href="https://maps.app.goo.gl/WM1tmL39637HUFnE7" target="_blank" rel="noopener noreferrer">Link Google Maps</a></p></div><div class="restaurant-card"><h3>Osteria Sant'Uffizio Vaticano</h3><p>Gestione Italiana, ottima cucina e orari di apertura estesi.</p><p><strong>Via delle Fornaci, 5</strong></p><p><a class="map-link" href="https://maps.app.goo.gl/1pcsPJNQiFeyzowF7" target="_blank" rel="noopener noreferrer">Link Google Maps</a></p></div></div>`,

            shops: {
              title: "Negozi",
              body: `<p>Ecco i negozi e servizi utili consigliati:</p><div class="restaurant-list"><div class="restaurant-card"><h3>Carrefour Market</h3><p>Supermercato con ottimi prodotti, aperto fino alle 22:00.</p><p><strong>Via delle Fornaci, 136</strong></p><p><a class="map-link" href="https://maps.app.goo.gl/VUoQnUHaRb2dEw1L6" target="_blank" rel="noopener noreferrer">Link Google Maps</a></p></div><div class="restaurant-card"><h3>Farmacia Leone</h3><p>Farmacia molto vicina al nostro B&amp;B, aperta fino alle 19:30.</p><p><strong>Via di Porta Cavalleggeri, 3</strong></p><p><a class="map-link" href="https://maps.app.goo.gl/SsGCmLL1Poap1mm86" target="_blank" rel="noopener noreferrer">Link Google Maps</a></p></div><div class="restaurant-card"><h3>Gelotti</h3><p>Ottima gelateria a due passi dal nostro B&amp;B.</p><p><strong>Via delle Fornaci, 16</strong></p><p><a class="map-link" href="https://maps.app.goo.gl/fcVKUbQCRdSU4Ncw9" target="_blank" rel="noopener noreferrer">Link Google Maps</a></p></div><div class="restaurant-card"><h3>Pasticceria Rispo Franca</h3><p>Pasticceria artigianale di qualità eccellente e con prezzi onesti.</p><p><strong>Via della Stazione di S.Pietro, 24</strong></p><p><a class="map-link" href="https://maps.app.goo.gl/AaxfMUTyf4jxKinX9" target="_blank" rel="noopener noreferrer">Link Google Maps</a></p></div><div class="restaurant-card"><h3>Tabaccheria Iqos Partner</h3><p>Negozio dove si possono acquistare i biglietti dell'autobus.</p><p><strong>Via della Stazione di S.Pietro, 19</strong></p><p><a class="map-link" href="https://maps.app.goo.gl/zUkcQ2uan8wb27zr8" target="_blank" rel="noopener noreferrer">Link Google Maps</a></p></div><div class="restaurant-card"><h3>BICIEVENTO</h3><p>Noleggio biciclette professionale, interessanti tour in bicicletta.</p><p><strong>Via di Santa Maria alle Fornaci, 6</strong></p><p><a class="map-link" href="https://maps.app.goo.gl/uKPNHWNAfnUZcBtN8" target="_blank" rel="noopener noreferrer">Link Google Maps</a></p></div></div>`,

 in Agone</h3><p>Gioiello barocco affacciato su Piazza Navona: interni eleganti e storia affascinante.</p><p><a class="map-link" href="https://maps.app.goo.gl/6GC4TUyzrwqjZCoeA" target="_blank" rel="noopener noreferrer">Link Google Maps</a></p></div><div class="restaurant-card"><h3>Chiesa di San Luigi dei Francesi</h3><p>Da non perdere per Caravaggio: nella Cappella Contarelli ci sono capolavori dedicati a San Matteo.</p><p><a class="map-link" href="https://maps.app.goo.gl/WBR9BP5wMq4E6qHB8" target="_blank" rel="noopener noreferrer">Link Google Maps</a></p></div><div class="restaurant-card"><h3>Pantheon (Santa Maria ad Martyres)</h3><p>Meraviglia dell’antica Roma: la cupola e l’oculo lasciano sempre a bocca aperta.</p><p><a class="map-link" href="https://maps.app.goo.gl/pNZD4Wf81Xjv3Cdr8" target="_blank" rel="noopener noreferrer">Link Google Maps</a></p></div><div class="restaurant-card"><h3>Largo di Torre Argentina</h3><p>Area archeologica con templi antichi in pieno centro: un tuffo nella Roma repubblicana.</p><p><a class="map-link" href="https://maps.app.goo.gl/XUSGks9iwRumusZJ8" target="_blank" rel="noopener noreferrer">Link Google Maps</a></p></div><div class="restaurant-card"><h3>Piazza Venezia e Vittoriano (Altare della Patria)</h3><p>Punto “snodo” della città: monumentale, scenografico e pieno di viste interessanti.</p><p><a class="map-link" href="https://maps.app.goo.gl/67RH7rQsEd4q2EeF6" target="_blank" rel="noopener noreferrer">Link Google Maps</a></p></div><div class="restaurant-card"><h3>Basilica di Santa Maria in Ara Coeli e Scalinata</h3><p>Chiesa sul Campidoglio raggiunta da una famosa scalinata (i “124 gradini” sono un classico).</p><p><a class="map-link" href="https://maps.app.goo.gl/2y1qFaMpmgbHuUT16" target="_blank" rel="noopener noreferrer">Link Google Maps</a></p></div><div class="restaurant-card"><h3>Musei Capitolini (Campidoglio)</h3><p>Il museo civico simbolo di Roma: tra i pezzi iconici ci sono la Lupa Capitolina e grandi sculture antiche.</p><p><a class="map-link" href="https://maps.app.goo.gl/EBQXgfKYVLXXNG2cA" target="_blank" rel="noopener noreferrer">Link Google Maps</a></p></div><div class="restaurant-card"><h3>Foro Romano e Via dei Fori Imperiali</h3><p>Il cuore dell’antica Roma: rovine, colonne e prospettive incredibili camminando verso il Colosseo.</p><p><a class="map-link" href="https://maps.app.goo.gl/7VwqPrgxt1TmKiEY9" target="_blank" rel="noopener noreferrer">Link Google Maps</a></p></div><div class="restaurant-card"><h3>Colosseo</h3><p>L’anfiteatro più famoso del mondo: impressionante dal vivo, soprattutto al tramonto o in serata.</p><p><a class="map-link" href="https://maps.app.goo.gl/xbSWmQJRBcQE5tcc6" target="_blank" rel="noopener noreferrer">Link Google Maps</a></p></div></div>`,

              title: "Your Room",
              body: `<p><strong>Useful Information:</strong><br />In your room you will find everything you need for breakfast the next day. If your booking includes multiple nights, we will return every morning at 10:00 AM to clean the room and refresh breakfast supplies.</p><p>During the winter period, the heating turns on automatically. To customize the room temperature, you can use the air conditioner with the white remote control.</p><p>At this link you will find a short video with instructions on how to use our coffee machine:<br /><a href="https://www.bbvaticanstories.it/bb-roma-vaticano/how-to-use-our-coffee-machine/" target="_blank" rel="noopener noreferrer">How to use our coffee machine</a></p><p>For longer stays: towels and bed linen are changed every 3 days.</p><p><strong>House Rules:</strong></p><ul><li>Smoking is strictly prohibited in the rooms.</li><li>Please respect quiet hours and do not make noise from 10:00 PM to 8:00 AM.</li></ul>`,

            places: {

              body: `<p>Here are our recommended places of interest:</p><div class="restaurant-list"><div class="restaurant-card"><h3>St. Peter's Square (Vatican)</h3><p>The grand embrace of Bernini’s colonnade: perfect for photos, atmosphere, and views of the Basilica.</p><p><a class="map-link" href="https://maps.app.goo.gl/PnwugsYVf5xraM2G8" target="_blank" rel="noopener noreferrer">Google Maps Link</a></p></div><div class="restaurant-card"><h3>St. Peter's Basilica</h3><p>An absolute masterpiece of sacred art: dome, marble, altars, and (if you climb) a spectacular view over Rome.</p><p><a class="map-link" href="https://maps.app.goo.gl/AvAXwvAWh8XaS6vH8" target="_blank" rel="noopener noreferrer">Google Maps Link</a></p></div><div class="restaurant-card"><h3>Vatican Museums & Sistine Chapel</h3><p>One of the most important collections in the world; the Sistine Chapel alone is worth the visit (Michelangelo).</p><p><a class="map-link" href="https://maps.app.goo.gl/m1TBpPwapjMR7wCx8" target="_blank" rel="noopener noreferrer">Google Maps Link</a></p></div><div class="restaurant-card"><h3>Castel Sant’Angelo (National Museum)</h3><p>From imperial mausoleum to papal fortress: historic rooms and a panoramic terrace over the Tiber.</p><p><a class="map-link" href="https://maps.app.goo.gl/6Y41RnuZ9oGJ8xKTA" target="_blank" rel="noopener noreferrer">Google Maps Link</a></p></div><div class="restaurant-card"><h3>Ponte Sant’Angelo</h3><p>Scenic walk among angel statues with one of the best views of Castel Sant’Angelo.</p><p><a class="map-link" href="https://maps.app.goo.gl/pu5GGFPGStDbKRYd9" target="_blank" rel="noopener noreferrer">Google Maps Link</a></p></div><div class="restaurant-card"><h3>Piazza Navona</h3><p>A postcard-perfect Baroque square with famous fountains and lively street life.</p><p><a class="map-link" href="https://maps.app.goo.gl/52xaVpepdygxBpHo6" target="_blank" rel="noopener noreferrer">Google Maps Link</a></p></div><div class="restaurant-card"><h3>Church of ant-card"><h3>Iglesia de Sant’Agnese in Agone</h3><p>Joya barroca frente a Piazza Navona: interiores elegantes e historia fascinante.</p><p><a class="map-link" href="https://maps.app.goo.gl/6GC4TUyzrwqjZCoeA" target="_blank" rel="noopener noreferrer">Enlace Google Maps</a></p></div><div class="restaurant-card"><h3>Iglesia de San Luigi dei Francesi</h3><p>Imprescindible por Caravaggio: en la Capilla Contarelli hay obras maestras dedicadas a San Mateo.</p><p><a class="map-link" href="https://maps.app.goo.gl/WBR9BP5wMq4E6qHB8" target="_blank" rel="noopener noreferrer">Enlace Google Maps</a></p></div><div class="restaurant-card"><h3>Panteón (Santa Maria ad Martyres)</h3><p>Maravilla de la antigua Roma: la cúpula y el óculo siempre dejan sin palabras.</p><p><a class="map-link" href="https://maps.app.goo.gl/pNZD4Wf81Xjv3Cdr8" target="_blank" rel="noopener noreferrer">Enlace Google Maps</a></p></div><div class="restaurant-card"><h3>Largo di Torre Argentina</h3><p>Área arqueológica con templos antiguos en pleno centro: un viaje a la Roma republicana.</p><p><a class="map-link" href="https://maps.app.goo.gl/XUSGks9iwRumusZJ8" target="_blank" rel="noopener noreferrer">Enlace Google Maps</a></p></div><div class="restaurant-card"><h3>Piazza Venezia y Vittoriano (Altare della Patria)</h3><p>Punto clave de la ciudad: monumental, escenográfico y lleno de vistas interesantes.</p><p><a class="map-link" href="https://maps.app.goo.gl/67RH7rQsEd4q2EeF6" target="_blank" rel="noopener noreferrer">Enlace Google Maps</a></p></div><div class="restaurant-card"><h3>Basílica de Santa Maria in Ara Coeli y Escalinata</h3><p>Iglesia en el Campidoglio a la que se llega por una famosa escalinata (los “124 escalones” son un clásico).</p><p><a class="map-link" href="https://maps.app.goo.gl/2y1qFaMpmgbHuUT16" target="_blank" rel="noopener noreferrer">Enlace Google Maps</a></p></div><div class="restaurant-card"><h3>Museos Capitolinos (Campidoglio)</h3><p>El museo cívico símbolo de Roma: entre las piezas         modalBody.innerHTML = section.body;
        modal.classList.add("open");
        modal.setAttribute("aria-hidden", "false");
        document.body.style.overflow = "hidden";
      }

      function closeModal() {
        modal.classList.remove("open");
        modal.setAttribute("aria-hidden", "true");
        document.body.style.overflow = "";
      }

      langButtons.forEach((button) => {
        button.addEventListener("click", () => {
          applyLanguage(button.dataset.lang);
        });
      });

      cards.forEach((card) => {
        card.addEventListener("click", () => openModal(card.dataset.item));
      });

      closeModalBtn.addEventListener("click", closeModal);
      modal.addEventListener("click", (event) => {
        if (event.target === modal) closeModal();
      });

      document.addEventListener("keydown", (event) => {
        if (event.key === "Escape" && modal.classList.contains("open")) {
          closeModal();
        }
      });

      applyLanguage("it");
    </script>
  </body>
</html>
